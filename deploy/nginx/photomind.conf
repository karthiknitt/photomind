# PhotoMind — Nginx reverse proxy config
#
# Setup:
#   1. Get your Tailscale hostname:
#        tailscale status --json | jq -r '.Self.DNSName | rtrimstr(".")'
#      Example: photomind-vps.tail1234.ts.net
#
#   2. Issue a Tailscale TLS cert (run once, auto-renewed via Tailscale):
#        sudo tailscale cert <your-tailscale-hostname>
#      Certs land in the current directory; move them:
#        sudo mv <hostname>.crt /etc/ssl/photomind/cert.crt
#        sudo mv <hostname>.key /etc/ssl/photomind/cert.key
#        sudo chmod 600 /etc/ssl/photomind/cert.key
#
#   3. Symlink this file into sites-enabled:
#        sudo ln -s ~/projects/PhotoMind/deploy/nginx/photomind.conf \
#                   /etc/nginx/sites-enabled/photomind
#        sudo nginx -t && sudo systemctl reload nginx
#
# Replace TAILSCALE_HOSTNAME below with your actual hostname.

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────

server {
    listen 80;
    server_name 100.106.254.102 TAILSCALE_HOSTNAME;
    return 301 https://$host$request_uri;
}

# ─── HTTPS — main app ─────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name 100.106.254.102 TAILSCALE_HOSTNAME;

    ssl_certificate     /etc/ssl/photomind/cert.crt;
    ssl_certificate_key /etc/ssl/photomind/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Increase buffer for large thumbnail uploads
    client_max_body_size 50m;

    # ─── Next.js static assets (long-lived cache) ───────────────────────

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3003;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3003;
        expires 7d;
        access_log off;
    }

    # ─── All other routes → Next.js ─────────────────────────────────────

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev; harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass          $http_upgrade;

        proxy_read_timeout 60s;
    }

    # ─── Logging ─────────────────────────────────────────────────────────

    access_log /var/log/nginx/photomind.access.log;
    error_log  /var/log/nginx/photomind.error.log warn;
}
